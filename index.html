<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="동물상 테스트 웹앱 - Teachable Machine 모델로 강아지상/고양이상 분석, 댓글 공유, 제휴 문의까지 한 번에."
    />
    <meta name="robots" content="index,follow" />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1867290585705548"
      crossorigin="anonymous"
    ></script>
    <title>동물상 테스트</title>
    <style>
      * {
        box-sizing: border-box;
      }
      :root {
        --bg: #f4f6fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px 16px 40px;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(244, 246, 251, 0.92);
        backdrop-filter: blur(6px);
        border-bottom: 1px solid var(--line);
      }
      .topbar-inner {
        max-width: 980px;
        margin: 0 auto;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        font-size: 16px;
        font-weight: 800;
      }
      .nav {
        display: flex;
        gap: 10px;
      }
      .nav a {
        text-decoration: none;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }
      .nav a:hover {
        color: var(--text);
      }
      .hero {
        background: linear-gradient(135deg, #dbeafe, #eff6ff 60%, #ffffff);
        border: 1px solid #bfdbfe;
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 14px;
      }
      .hero h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }
      .hero p {
        margin: 0;
        color: #374151;
        line-height: 1.55;
      }
      .quick-actions {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .quick-actions a {
        text-decoration: none;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 8px 20px rgba(17, 24, 39, 0.05);
      }
      .card + .card {
        margin-top: 12px;
      }
      h1,
      h2 {
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      .step {
        font-size: 12px;
        color: #1d4ed8;
        font-weight: 800;
        letter-spacing: 0.02em;
      }
      .field {
        margin-bottom: 10px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 14px;
      }
      input[type="text"],
      input[type="file"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        background: #fff;
      }
      .btn {
        border: none;
        background: var(--primary);
        color: #fff;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn:hover:not(:disabled) {
        background: var(--primary-dark);
      }
      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .preview {
        width: 100%;
        max-height: 320px;
        object-fit: contain;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f9fafb;
        margin-top: 10px;
      }
      .result {
        margin-top: 14px;
        padding: 12px;
        border-radius: 8px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
      }
      .result strong {
        font-size: 17px;
      }
      .loading-box {
        margin-top: 14px;
        padding: 12px;
        border-radius: 8px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
      }
      .loading-text {
        margin: 0 0 8px;
        font-size: 13px;
        color: #1e3a8a;
        font-weight: 700;
      }
      .loading-track {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: #dbeafe;
      }
      .loading-fill {
        width: 30%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #2563eb, #60a5fa);
        animation: loadingSlide 1.1s ease-in-out infinite;
      }
      @keyframes loadingSlide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(340%);
        }
      }
      .bars {
        margin-top: 10px;
      }
      .bar-item {
        margin-bottom: 10px;
      }
      .bar-label {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 4px;
      }
      .bar-track {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: #e5e7eb;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #2563eb, #16a34a);
      }
      .comments-frame {
        width: 100%;
        height: 560px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }
      .link-btn {
        display: inline-block;
        margin-top: 2px;
        text-decoration: none;
        color: var(--text);
        font-size: 14px;
        font-weight: 700;
      }
      .footer {
        margin-top: 20px;
        text-align: center;
        font-size: 12px;
        color: var(--muted);
      }
      .footer a {
        color: #4b5563;
        text-decoration: none;
        margin: 0 6px;
      }
    </style>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "동물상 테스트",
        "applicationCategory": "EntertainmentApplication",
        "operatingSystem": "Web",
        "description": "Teachable Machine 모델로 강아지상/고양이상 테스트를 제공하는 웹앱"
      }
    </script>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">동물상 테스트</div>
        <nav class="nav">
          <a href="#animal-test">테스트</a>
          <a href="#comments">댓글</a>
          <a href="#partnership">제휴 문의</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>강아지상 vs 고양이상, 1분 테스트</h1>
        <p>
          얼굴 사진 업로드로 바로 분석해보세요. 결과는 실시간 확률로 표시되며, 댓글로 테스트 경험을
          공유할 수 있습니다.
        </p>
        <div class="quick-actions">
          <a href="#animal-test">바로 테스트하기</a>
          <a href="#comments">댓글 확인하기</a>
          <a href="#partnership">제휴 문의하기</a>
        </div>
      </section>

      <section id="animal-test" class="card">
        <h2>동물상 테스트</h2>
        <div class="field">
          <label for="imageInput">얼굴 이미지 업로드 (정면 권장)</label>
          <input id="imageInput" type="file" accept="image/*" />
        </div>
        <img id="previewImage" class="preview" alt="미리보기" style="display: none" />
        <div class="btn-row" style="margin-top: 12px">
          <button class="btn" id="predictBtn" type="button" disabled>테스트 시작</button>
        </div>

        <div id="loadingBox" class="loading-box" style="display: none">
          <p class="loading-text">AI가 이미지를 분석하는 중입니다...</p>
          <div class="loading-track">
            <div class="loading-fill"></div>
          </div>
        </div>

        <div id="resultBox" class="result" style="display: none">
          <strong id="resultTitle"></strong>
          <p id="resultDesc" style="margin-top: 8px"></p>
          <div id="probabilityBars" class="bars"></div>
        </div>
        <p style="margin-top: 10px; font-size: 12px">
          결과는 오락/참고용입니다. 촬영 환경, 각도, 조명에 따라 달라질 수 있습니다.
        </p>
      </section>

      <section id="comments" class="card">
        <iframe class="comments-frame" src="comments.html" title="댓글 창"></iframe>
      </section>

      <section id="partnership" class="card">
        <h2>제휴 문의</h2>
        <p>서비스 협업/제휴 문의는 아래 페이지에서 접수할 수 있습니다.</p>
        <a class="link-btn" href="partnership.html" target="_blank" rel="noopener noreferrer"
          >제휴 문의 페이지 열기</a
        >
      </section>

      <footer class="footer">
        <a href="about.html">서비스 소개</a>
        <a href="privacy.html">개인정보처리방침</a>
        <a href="editorial-policy.html">콘텐츠 운영 원칙</a>
        <a href="partnership.html">문의하기</a>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
      let model = null;
      let maxPredictions = 0;
      let selectedImage = null;
      const URL = "https://teachablemachine.withgoogle.com/models/WVnGWc7EP/";

      const imageInput = document.getElementById("imageInput");
      const previewImage = document.getElementById("previewImage");
      const predictBtn = document.getElementById("predictBtn");
      const loadingBox = document.getElementById("loadingBox");
      const resultBox = document.getElementById("resultBox");
      const resultTitle = document.getElementById("resultTitle");
      const resultDesc = document.getElementById("resultDesc");
      const probabilityBars = document.getElementById("probabilityBars");

      async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        predictBtn.disabled = true;

        try {
          model = await tmImage.load(modelURL, metadataURL);
          maxPredictions = model.getTotalClasses();
          if (selectedImage) {
            predictBtn.disabled = false;
          }
        } catch (error) {
          model = null;
          console.error(error);
        }
      }

      function toPercent(value) {
        return (value * 100).toFixed(1) + "%";
      }

      function getAnimalFaceMessage(label, confidence) {
        const lower = label.toLowerCase();
        if (lower.includes("dog") || lower.includes("강아지")) {
          return confidence > 0.8
            ? "활발하고 친근한 강아지상이 강하게 나타나요!"
            : "부드럽고 친근한 강아지상 매력이 보여요.";
        }
        if (lower.includes("cat") || lower.includes("고양이")) {
          return confidence > 0.8
            ? "도도하고 세련된 고양이상이 강하게 나타나요!"
            : "차분하고 시크한 고양이상 느낌이 있어요.";
        }
        return "모델 결과를 기준으로 가장 가까운 동물상입니다.";
      }

      async function predictImage() {
        if (!model || !selectedImage) {
          return;
        }

        predictBtn.disabled = true;
        resultBox.style.display = "none";
        loadingBox.style.display = "block";

        try {
          const predictions = await model.predict(selectedImage, false);
          renderPredictions(predictions);
        } finally {
          loadingBox.style.display = "none";
          predictBtn.disabled = false;
        }
      }

      function renderPredictions(predictions) {
        predictions.sort(function (a, b) {
          return b.probability - a.probability;
        });

        const best = predictions[0];
        resultTitle.textContent =
          "당신은 " + best.className + " 타입! (" + toPercent(best.probability) + ")";
        resultDesc.textContent = getAnimalFaceMessage(best.className, best.probability);

        probabilityBars.innerHTML = "";
        for (let i = 0; i < Math.min(predictions.length, maxPredictions); i += 1) {
          const item = document.createElement("div");
          item.className = "bar-item";

          const labelRow = document.createElement("div");
          labelRow.className = "bar-label";
          labelRow.innerHTML =
            "<span>" +
            predictions[i].className +
            "</span><span>" +
            toPercent(predictions[i].probability) +
            "</span>";

          const track = document.createElement("div");
          track.className = "bar-track";
          const fill = document.createElement("div");
          fill.className = "bar-fill";
          fill.style.width = toPercent(predictions[i].probability);
          track.appendChild(fill);

          item.appendChild(labelRow);
          item.appendChild(track);
          probabilityBars.appendChild(item);
        }

        resultBox.style.display = "block";
      }

      imageInput.addEventListener("change", function (event) {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          previewImage.src = "";
          previewImage.style.display = "none";
          return;
        }

        const reader = new FileReader();
        reader.onload = function (e) {
          previewImage.src = e.target.result;
          previewImage.onload = function () {
            previewImage.style.display = "block";
            selectedImage = previewImage;
            if (model) {
              predictBtn.disabled = false;
            }
          };
        };
        reader.readAsDataURL(file);
      });

      predictBtn.addEventListener("click", predictImage);
      init();
    </script>
  </body>
</html>
